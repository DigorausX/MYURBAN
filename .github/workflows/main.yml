name: BKK Air force ONE Auto-Update

on:
  schedule:
    # ตั้งเวลารันอัตโนมัติทุกๆ เที่ยงคืนของไทย (UTC 17:00)
    - cron: '0 17 * * *'
  workflow_dispatch: # ใส่ปุ่มให้เรากดอัปเดตเองได้ตลอดเวลา

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Libraries
        run: |
          pip install pandas numpy

      - name: ⚙️ Run Dashboard Generator
        run: |
          python generate_dashboard.py

      - name: 🚀 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "🤖 Auto-updated Command Center Dashboard" || echo "No changes to commit"
          git push
