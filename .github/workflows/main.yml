name: BKK Air force ONE Auto-Update

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

# ย้ำสิทธิ์การเข้าถึงอีกครั้ง
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Libraries
        run: |
          pip install pandas numpy

      - name: ⚙️ Run Dashboard Generator
        run: |
          python generate_dashboard.py

      # 🚀 เปลี่ยนมาใช้ Plugin เฉพาะทางสำหรับ Commit & Push ด่าน 128 จะไม่มีทางเกิดขึ้นอีก!
      - name: 🚀 Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-updated Command Center Dashboard"
          file_pattern: 'index.html'
