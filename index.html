<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #ff4500; font-family: 'Segoe UI', sans-serif; margin: 20px; }
        .dashboard { max-width: 600px; margin: auto; border: 3px solid #ff4500; padding: 20px; border-radius: 15px; box-shadow: 0 0 25px rgba(255, 69, 0, 0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box { background: #111; border: 1px solid #ff4500; padding: 20px; text-align: center; border-radius: 10px; }
        .val { font-size: 2.5rem; font-weight: 900; display: block; color: #fff; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>BKK AIR FORCE ONE</h1>
        <div class="grid">
            <div class="box">ฝน (mm/h)<span class="val" id="rain">--</span></div>
            <div class="box">ลม (km/h)<span class="val" id="wind">--</span></div>
        </div>
    </div>
    <script>
        fetch('https://api.open-meteo.com/v1/forecast?latitude=13.75&longitude=100.50&current=precipitation,wind_speed_10m')
        .then(r => r.json())
        .then(d => {
            document.getElementById('rain').innerText = d.current.precipitation;
            document.getElementById('wind').innerText = d.current.wind_speed_10m;
        });
    </script>
</body>
</html>
