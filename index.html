<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #ff4500; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 800px; border: 2px solid #ff4500; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px #ff4500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { border: 1px solid #ff4500; padding: 15px; border-radius: 10px; text-align: center; }
        .val { font-size: 2.5rem; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>BKK AIR FORCE ONE - TACTICAL</h1>
        <div class="grid">
            <div class="box">ฝนปัจจุบัน <span class="val" id="rain">--</span> mm/h</div>
            <div class="box">ความเร็วลม <span class="val" id="wind">--</span> km/h</div>
        </div>
        <p style="text-align: center; margin-top: 20px;">สถานะ: ออนไลน์ | ระบบพร้อมใช้งาน</p>
    </div>
    <script>
        fetch('https://api.open-meteo.com/v1/forecast?latitude=13.75&longitude=100.50&current=precipitation,wind_speed_10m')
        .then(r => r.json())
        .then(d => {
            document.getElementById('rain').innerText = d.current.precipitation;
            document.getElementById('wind').innerText = d.current.wind_speed_10m;
        });
    </script>
</body>
</html>
